<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>펜스테르담 Solver v6</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:sans-serif;font-size:13px;color:#1a1a18;background:#f9f9f7;padding:16px;}
h1{font-size:16px;font-weight:500;margin-bottom:12px;}
.cell{width:42px;height:42px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:500;line-height:1.2;text-align:center;background:#f1efe8;position:relative;}
.cell.empty-slot{background:transparent;}
.cell.target{background:#fff!important;color:#1a1a18!important;outline:2.5px solid #444;outline-offset:-1px;}
select{padding:4px 8px;border-radius:6px;border:0.5px solid #ccc;background:#f1efe8;color:#1a1a18;font-size:12px;}
button{padding:5px 12px;border-radius:6px;border:0.5px solid #ccc;background:#f1efe8;color:#1a1a18;font-size:12px;cursor:pointer;}
button:hover{background:#fff;}
button.primary{background:#1a1a18;color:#fff;border-color:#1a1a18;}
button.primary:hover{opacity:0.85;}
.lbl{font-size:11px;color:#666;margin-bottom:3px;}
.tag{display:inline-block;font-size:10px;padding:2px 6px;border-radius:4px;margin-right:4px;font-weight:500;}
.tag-kr{background:#EEEDFE;color:#3C3489;}
.tag-en{background:#FBEAF0;color:#72243E;}
.controls{display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end;margin-bottom:10px;}
.status-row{display:flex;gap:8px;align-items:center;margin-bottom:8px;flex-wrap:wrap;font-size:12px;color:#666;}
#sol-nav{display:none;gap:6px;align-items:center;}
#board{display:grid;grid-template-columns:repeat(7,42px);gap:0;}
#legend{margin-top:10px;display:flex;flex-wrap:wrap;gap:6px;}
.legend-item{display:flex;align-items:center;gap:4px;font-size:11px;}
.legend-box{width:14px;height:14px;border-radius:2px;}
</style>
</head>
<body>

<h1>펜스테르담 Solver</h1>

<div class="controls">
  <div><div class="lbl">월</div>
    <select id="sel-month">
      <option>1월</option><option>2월</option><option>3월</option><option>4월</option>
      <option>5월</option><option>6월</option><option>7월</option><option>8월</option>
      <option>9월</option><option>10월</option><option>11월</option><option>12월</option>
    </select>
  </div>
  <div><div class="lbl">일</div><select id="sel-day"></select></div>
  <div><div class="lbl">요일</div>
    <select id="sel-weekday">
      <option value="日">日(일)</option><option value="月">月(월)</option>
      <option value="火">火(화)</option><option value="水">水(수)</option>
      <option value="木">木(목)</option><option value="金">金(금)</option>
      <option value="土">土(토)</option>
    </select>
  </div>
  <div><div class="lbl">날씨</div>
    <select id="sel-weather">
      <option>맑음</option><option>흐림</option><option>비</option><option>눈</option>
    </select>
  </div>
  <button class="primary" onclick="runSolver()">풀기</button>
  <button onclick="resetBoard()">초기화</button>
</div>

<div class="status-row">
  <span id="status">날짜와 날씨를 선택하고 풀기를 눌러주세요.</span>
  <div id="sol-nav">
    <button onclick="prevSol()">◀</button>
    <span id="sol-idx"></span>
    <button onclick="nextSol()">▶</button>
  </div>
</div>

<div style="margin-bottom:8px;min-height:20px;"><span id="weekday-tag"></span></div>

<div id="board"></div>
<div id="legend"></div>

<script>
const BOARD_DATA=[
  {row:0,col:0,label:"1월"},{row:0,col:1,label:"2월"},{row:0,col:2,label:"3월"},{row:0,col:3,label:"4월"},
  {row:0,col:4,label:"Sun"},{row:0,col:5,label:"Mon"},{row:0,col:6,label:"Tue"},
  {row:1,col:0,label:"5월"},{row:1,col:1,label:"6월"},{row:1,col:2,label:"7월"},{row:1,col:3,label:"8월"},
  {row:1,col:4,label:"Wed"},{row:1,col:5,label:"Thu"},{row:1,col:6,label:"Fri"},
  {row:2,col:0,label:"9월"},{row:2,col:1,label:"10월"},{row:2,col:2,label:"11월"},{row:2,col:3,label:"12월"},
  {row:2,col:4,label:"26"},{row:2,col:5,label:"27"},{row:2,col:6,label:"Sat"},
  {row:3,col:0,label:"1"},{row:3,col:1,label:"2"},{row:3,col:2,label:"3"},
  {row:3,col:3,label:"맑음"},{row:3,col:4,label:"비"},{row:3,col:5,label:"흐림"},{row:3,col:6,label:"눈"},
  {row:4,col:0,label:"4"},{row:4,col:1,label:"5"},{row:4,col:2,label:"6"},{row:4,col:3,label:"7"},
  {row:4,col:4,label:"8"},{row:4,col:5,label:"9"},{row:4,col:6,label:"10"},
  {row:5,col:0,label:"11"},{row:5,col:1,label:"12"},{row:5,col:2,label:"13"},{row:5,col:3,label:"14"},
  {row:5,col:4,label:"15"},{row:5,col:5,label:"16"},{row:5,col:6,label:"17"},
  {row:6,col:0,label:"18"},{row:6,col:1,label:"19"},{row:6,col:2,label:"20"},{row:6,col:3,label:"21"},
  {row:6,col:4,label:"22"},{row:6,col:5,label:"日"},{row:6,col:6,label:"月"},
  {row:7,col:0,label:"23"},{row:7,col:1,label:"24"},{row:7,col:2,label:"25"},{row:7,col:3,label:"26"},
  {row:7,col:4,label:"27"},{row:7,col:5,label:"火"},{row:7,col:6,label:"水"},
  {row:8,col:0,label:"28"},{row:8,col:1,label:"29"},{row:8,col:2,label:"30"},{row:8,col:3,label:"31"},
  {row:8,col:4,label:"木"},{row:8,col:5,label:"金"},{row:8,col:6,label:"土"},
  {row:9,col:3,label:"★"},
];

const ROWS=10,COLS=7;
const KR_TO_EN={'日':'Sun','月':'Mon','火':'Tue','水':'Wed','木':'Thu','金':'Fri','土':'Sat'};
const PIECE_COLORS=['#9FE1CB','#FAC775','#F4C0D1','#B5D4F4','#C0DD97','#F5C4B3','#CECBF6','#D3D1C7','#F7C1C1','#5DCAA5','#EF9F27','#85B7EB'];
const PIECE_BORDER_COLORS=['#1D9E75','#BA7517','#D4537E','#185FA5','#3B6D11','#D85A30','#534AB7','#5F5E5A','#A32D2D','#0F6E56','#854F0B','#185FA5'];
const PIECE_NAMES=['F','I','L','N','P','T','U','V','W','X','Y','Z'];
const PIECE_IDX={};
PIECE_NAMES.forEach((n,i)=>PIECE_IDX[n]=i);

const PENTOMINOES={
  F:[[0,1],[0,2],[1,0],[1,1],[2,1]],I:[[0,0],[1,0],[2,0],[3,0],[4,0]],
  L:[[0,0],[1,0],[2,0],[3,0],[3,1]],N:[[0,1],[1,0],[1,1],[2,0],[3,0]],
  P:[[0,0],[0,1],[1,0],[1,1],[2,0]],T:[[0,0],[0,1],[0,2],[1,1],[2,1]],
  U:[[0,0],[0,2],[1,0],[1,1],[1,2]],V:[[0,0],[1,0],[2,0],[2,1],[2,2]],
  W:[[0,0],[1,0],[1,1],[2,1],[2,2]],X:[[0,1],[1,0],[1,1],[1,2],[2,1]],
  Y:[[0,1],[1,0],[1,1],[2,1],[3,1]],Z:[[0,0],[0,1],[1,1],[2,1],[2,2]],
};

function cellKey(r,c){return r*COLS+c;}
function isValid(r,c){if(r<0||r>=ROWS||c<0||c>=COLS)return false;if(r===9&&c!==3)return false;return true;}
function rotate90(c){return c.map(([r,c])=>[-c,r]);}
function reflect(c){return c.map(([r,c])=>[r,-c]);}
function normalize(c){const mr=Math.min(...c.map(x=>x[0])),mc=Math.min(...c.map(x=>x[1]));return c.map(([r,col])=>[r-mr,col-mc]).sort((a,b)=>a[0]-b[0]||a[1]-b[1]);}
function shapeKey(c){return normalize(c).join('|');}
function getVariants(c){const seen=new Set(),v=[];let cur=c;for(let i=0;i<4;i++){const n=normalize(cur);if(!seen.has(shapeKey(n))){seen.add(shapeKey(n));v.push(n);}const ref=normalize(reflect(cur));if(!seen.has(shapeKey(ref))){seen.add(shapeKey(ref));v.push(ref);}cur=normalize(rotate90(cur));}return v;}

const PIECE_PLACEMENTS={};
PIECE_NAMES.forEach(name=>{
  PIECE_PLACEMENTS[name]=[];
  for(const variant of getVariants(PENTOMINOES[name])){
    for(let br=0;br<ROWS;br++) for(let bc=0;bc<COLS;bc++){
      const cells=variant.map(([vr,vc])=>[br+vr,bc+vc]);
      if(cells.every(([r,c])=>isValid(r,c)))
        PIECE_PLACEMENTS[name].push(cells.map(([r,c])=>cellKey(r,c)));
    }
  }
});

const labelMap={};
BOARD_DATA.forEach(d=>{labelMap[cellKey(d.row,d.col)]=d.label;});

let solutions=[],solIdx=0;
const MAX_SOL_PER_VARIANT=3;

function shuffle(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

function solve(targetKeys,maxSol,pieceOrder){
  const grid=new Uint8Array(ROWS*COLS);
  BOARD_DATA.forEach(d=>{const k=cellKey(d.row,d.col);grid[k]=targetKeys.has(k)?2:1;});
  const results=[];
  const used=new Uint8Array(12);
  const assignment=new Int8Array(ROWS*COLS).fill(-1);
  function bt(){
    let ff=-1;
    for(let i=0;i<grid.length;i++){if(grid[i]===1){ff=i;break;}}
    if(ff===-1){results.push({assignment:Int8Array.from(assignment),targets:new Set(targetKeys)});return results.length>=maxSol;}
    for(const name of pieceOrder){
      const pi=PIECE_IDX[name];
      if(used[pi]) continue;
      for(const keys of PIECE_PLACEMENTS[name]){
        if(!keys.includes(ff)) continue;
        if(!keys.every(k=>grid[k]===1)) continue;
        keys.forEach(k=>{grid[k]=0;assignment[k]=pi;});
        used[pi]=1;
        if(bt()) return true;
        keys.forEach(k=>{grid[k]=1;assignment[k]=-1;});
        used[pi]=0;
      }
    }
    return false;
  }
  bt();
  return results;
}

function buildTargetKeys(month,day,weekdayLabel,weather){
  const t=new Set();
  BOARD_DATA.forEach(d=>{if(d.label===month)t.add(cellKey(d.row,d.col));});
  for(const d of BOARD_DATA){if(d.label===day){t.add(cellKey(d.row,d.col));break;}}
  for(const d of BOARD_DATA){if(d.label===weekdayLabel){t.add(cellKey(d.row,d.col));break;}}
  BOARD_DATA.forEach(d=>{if(d.label===weather)t.add(cellKey(d.row,d.col));});
  return t;
}

function getBorders(r,c,assignment,tk){
  const k=cellKey(r,c);
  const myPi=tk.has(k)?-2:assignment[k];
  const THICK=2.5,THIN=0.5;
  const BC='rgba(0,0,0,0.1)';
  const dirs={top:[-1,0],bottom:[1,0],left:[0,-1],right:[0,1]};
  const result={};
  for(const [side,[dr,dc]] of Object.entries(dirs)){
    const nr=r+dr,nc=c+dc;
    let neighborPi;
    if(!isValid(nr,nc)){neighborPi=-99;}
    else{const nk=cellKey(nr,nc);neighborPi=tk.has(nk)?-2:assignment[nk];}
    if(neighborPi!==myPi){
      const color=myPi>=0?PIECE_BORDER_COLORS[myPi]:'#555';
      result[side]=`${THICK}px solid ${color}`;
    } else {
      result[side]=`${THIN}px solid ${BC}`;
    }
  }
  return result;
}

function runSolver(){
  const month=document.getElementById('sel-month').value;
  const day=document.getElementById('sel-day').value;
  const weekdayKR=document.getElementById('sel-weekday').value;
  const weekdayEN=KR_TO_EN[weekdayKR];
  const weather=document.getElementById('sel-weather').value;

  document.getElementById('status').textContent='계산 중...';
  document.getElementById('sol-nav').style.display='none';
  document.getElementById('weekday-tag').innerHTML='';

  setTimeout(()=>{
    const start=Date.now();
    solutions=[];
    const pieceOrder=shuffle(PIECE_NAMES);

    const tkKR=buildTargetKeys(month,day,weekdayKR,weather);
    if(tkKR.size===4){
      const res=solve(tkKR,MAX_SOL_PER_VARIANT,pieceOrder);
      res.forEach(r=>{r.weekdayType='kr';r.weekdayLabel=weekdayKR;});
      solutions.push(...res);
    }
    const tkEN=buildTargetKeys(month,day,weekdayEN,weather);
    if(tkEN.size===4){
      const res=solve(tkEN,MAX_SOL_PER_VARIANT,pieceOrder);
      res.forEach(r=>{r.weekdayType='en';r.weekdayLabel=weekdayEN;});
      solutions.push(...res);
    }

    const ms=Date.now()-start;
    solIdx=0;
    if(!solutions.length){
      document.getElementById('status').textContent=`해를 찾지 못했어요. (${ms}ms)`;
    } else {
      document.getElementById('status').textContent=`${solutions.length}개 해 발견 (${ms}ms)`;
      document.getElementById('sol-nav').style.display='flex';
      showSolution(solutions[0]);
      updateNav();
    }
  },20);
}

function showSolution(sol){
  renderSolution(sol.assignment,sol.targets);
  const tag=document.getElementById('weekday-tag');
  tag.innerHTML=sol.weekdayType==='kr'
    ?`<span class="tag tag-kr">한자 요일 (${sol.weekdayLabel})</span>`
    :`<span class="tag tag-en">영어 요일 (${sol.weekdayLabel})</span>`;
}

function renderSolution(assignment,tk){
  const board=document.getElementById('board');
  board.innerHTML='';
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
    const el=document.createElement('div');
    el.className='cell';
    if(!isValid(r,c)){el.className='cell empty-slot';board.appendChild(el);continue;}
    const k=cellKey(r,c);
    el.textContent=labelMap[k]||'';
    if(tk.has(k)){
      el.classList.add('target');
    } else {
      const pi=assignment[k];
      if(pi>=0){
        el.style.background=PIECE_COLORS[pi];
        el.style.color='#2C2C2A';
        const borders=getBorders(r,c,assignment,tk);
        el.style.borderTop=borders.top;
        el.style.borderBottom=borders.bottom;
        el.style.borderLeft=borders.left;
        el.style.borderRight=borders.right;
      } else {
        el.style.border='0.5px solid #ccc';
      }
    }
    board.appendChild(el);
  }
  renderLegend();
}

function renderEmptyBoard(){
  const board=document.getElementById('board');board.innerHTML='';
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
    const el=document.createElement('div');
    if(!isValid(r,c)){el.className='cell empty-slot';board.appendChild(el);continue;}
    el.className='cell';
    el.style.border='0.5px solid #ccc';
    el.textContent=labelMap[cellKey(r,c)]||'';
    board.appendChild(el);
  }
}

function renderLegend(){
  const leg=document.getElementById('legend');leg.innerHTML='';
  PIECE_NAMES.forEach((name,i)=>{
    const div=document.createElement('div');div.className='legend-item';
    const box=document.createElement('div');
    box.className='legend-box';
    box.style.cssText=`background:${PIECE_COLORS[i]};border:2px solid ${PIECE_BORDER_COLORS[i]};`;
    div.appendChild(box);div.appendChild(document.createTextNode(name));leg.appendChild(div);
  });
}

function updateNav(){document.getElementById('sol-idx').textContent=`${solIdx+1} / ${solutions.length}`;}
function prevSol(){if(!solutions.length)return;solIdx=(solIdx-1+solutions.length)%solutions.length;showSolution(solutions[solIdx]);updateNav();}
function nextSol(){if(!solutions.length)return;solIdx=(solIdx+1)%solutions.length;showSolution(solutions[solIdx]);updateNav();}
function resetBoard(){
  solutions=[];solIdx=0;
  document.getElementById('status').textContent='날짜와 날씨를 선택하고 풀기를 눌러주세요.';
  document.getElementById('sol-nav').style.display='none';
  document.getElementById('weekday-tag').innerHTML='';
  document.getElementById('legend').innerHTML='';
  renderEmptyBoard();
}

const ds=document.getElementById('sel-day');
for(let i=1;i<=31;i++){const o=document.createElement('option');o.value=String(i);o.textContent=i+'일';ds.appendChild(o);}
const today=new Date();
document.getElementById('sel-month').value=(today.getMonth()+1)+'월';
document.getElementById('sel-day').value=String(today.getDate());
document.getElementById('sel-weekday').value=['日','月','火','水','木','金','土'][today.getDay()];
renderEmptyBoard();
</script>
</body>
</html>
